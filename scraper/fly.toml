app = "lead-gen-scraper"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  max_machines_running = 3

  [http_service.concurrency]
    type = "requests"
    hard_limit = 6
    soft_limit = 4

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
